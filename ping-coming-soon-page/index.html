<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ping single column coming soon page</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="main">
      <img class="main__logo" src="images/logo.svg" alt="logo" />
      <h1 class="main__title"><span>We are launching</span> soon!</h1>
      <p class="main__subtitle">Subscribe and get notified</p>
      <form class="form">
        <div class="form__group">
          <input
            type="text"
            id="email"
            class="form__input"
            placeholder="Your email address..." />
        </div>
        <button class="form__button">Notify Me</button>
      </form>
      <img
        class="main__image"
        src="images/illustration-dashboard.png"
        alt="illustration dashboard" />
      <div class="footer">
        <div class="footer__socials">
          <i class="footer__icon bx bxl-facebook"></i>
          <i class="footer__icon bx bxl-twitter"></i>
          <i class="footer__icon bx bxl-instagram"></i>
        </div>
        <p class="footer__text">&copy; Copyright Ping. All rights reserved.</p>
      </div>
    </main>
  </body>
</html>
