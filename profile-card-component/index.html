<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile card component</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
  </head>
  <body>
    <article class="profile-card">
      <header class="profile-card__header">
        <img
          alt="victor image"
          src="images/image-victor.jpg"
          class="profile-card__avatar" />
      </header>
      <h3 class="profile-card__name">Victor Crest</h3>
      <p class="profile-card__location">London</p>
      <section class="profile-card__stats">
        <div class="profile-card__stat">
          <h3 class="profile-card__stat-number">80K</h3>
          <span class="profile-card__stat-label">Followers</span>
        </div>
        <div class="profile-card__stat">
          <h3 class="profile-card__stat-number">803K</h3>
          <span class="profile-card__stat-label">Likes</span>
        </div>
        <div class="profile-card__stat">
          <h3 class="profile-card__stat-number">1.4K</h3>
          <span class="profile-card__stat-label">Photos</span>
        </div>
      </section>
    </article>
  </body>
</html>
