<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product preview card component</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon-32x32.png" type="image/x-icon" />
  </head>
  <body>
    <article class="card">
      <figure class="card__img">
        <img alt="product image" src="images/image-product.jpg" />
      </figure>
      <section class="card__content">
        <p class="card__category">Perfume</p>
        <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>
        <p class="card__description">
          A floral, solar, and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="card__price-wrapper">
          <h2 class="card__price">$149.99</h2>
          <p class="card__original-price"><s>$169.99</s></p>
        </div>
        <button type="button" class="card__btn">
          <img src="images/icon-cart.svg" alt="cart icon" />
          Add to Cart
        </button>
      </section>
    </article>
  </body>
</html>
