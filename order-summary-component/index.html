<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order summary component</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
  </head>
  <body>
    <div class="card">
      <img
        alt="hero illustration"
        src="images/illustration-hero.svg"
        class="card__img" />
      <div class="card__content">
        <h2 class="card__title">Order Summary</h2>
        <p class="card__lead">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="card__plan">
          <div class="card__plan-details">
            <img
              alt="music icon"
              src="images/icon-music.svg"
              class="card__plan-icon" />
            <div>
              <h4 class="card__plan-title">Annual Plan</h4>
              <p class="card__plan-price">$59.99/year</p>
            </div>
          </div>
          <a href="" class="card__link">Change</a>
        </div>
        <button type="button" class="card__btn card__btn--proceed">
          Proceed to Payment
        </button>
        <button type="button" class="card__btn card__btn--cancel">
          Cancel Order
        </button>
      </div>
    </div>
  </body>
</html>
