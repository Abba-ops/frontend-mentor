<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive rating component</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <template id="thank-you-card">
      <div class="card thank-you-card">
        <img
          class="thank-you-card__image"
          src="images/illustration-thank-you.svg"
          alt="thank you illustration" />
        <p class="thank-you-card__selection">
          You selected <span class="selection"></span> out of 5
        </p>
        <h2 class="thank-you-card__heading">Thank you!</h2>
        <p class="thank-you-card__message">
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </div>
    </template>

    <form class="card rating-card">
      <img
        class="rating-card__icon"
        src="images/icon-star.svg"
        alt="star icon" />
      <h2 class="rating-card__heading">How did we do?</h2>
      <p class="rating-card__description">
        Please let us know how we did with your support request. All feedback is
        appreciated to help us improve our offering!
      </p>
      <div class="rating-card__options">
        <div class="rating-card__option">1</div>
        <div class="rating-card__option">2</div>
        <div class="rating-card__option">3</div>
        <div class="rating-card__option">4</div>
        <div class="rating-card__option">5</div>
      </div>
      <button type="submit" class="rating-card__button">Submit</button>
    </form>
  </body>
</html>
