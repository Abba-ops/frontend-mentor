<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFT preview card component</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
  </head>
  <body>
    <div class="nft-card">
      <div class="nft-card__image">
        <img
          src="images/image-equilibrium.jpg"
          alt="equilibrium artwork"
          class="nft-card__image-img" />
      </div>
      <h3 class="nft-card__title">Equilibrium #3429</h3>
      <p class="nft-card__description">
        Our Equilibrium collection promotes balance and calm.
      </p>
      <div class="nft-card__details">
        <div class="nft-card__price">
          <img
            alt="ethereum icon"
            src="images/icon-ethereum.svg"
            class="nft-card__icon" />
          <span class="nft-card__price-text">0.041 ETH</span>
        </div>
        <div class="nft-card__time">
          <img
            alt="clock icon"
            src="images/icon-clock.svg"
            class="nft-card__icon" />
          <span class="nft-card__time-text">3 days left</span>
        </div>
      </div>
      <div class="nft-card__creator">
        <img
          alt="avatar image"
          src="images/image-avatar.png"
          class="nft-card__creator-avatar" />
        <p class="nft-card__creator-text">
          Creation of <span class="nft-card__creator-name">Jules Wyvern</span>
        </p>
      </div>
    </div>
  </body>
</html>
