<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing component with toggle</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="pricing">
      <header class="pricing__header">
        <h1 class="pricing__title">Our Pricing</h1>
        <div class="pricing__toggle">
          <span class="pricing__toggle-label">Annually</span>
          <label class="switch">
            <input type="checkbox" class="switch__input" />
            <span class="switch__slider"></span>
          </label>
          <span class="pricing__toggle-label">Monthly</span>
        </div>
      </header>

      <section class="pricing__plans">
        <article class="pricing__plan pricing__plan--basic">
          <h2 class="pricing__plan-title">Basic</h2>
          <p class="pricing__plan-price">199.99</p>
          <ul class="pricing__plan-features">
            <li class="pricing__plan-feature">500 GB Storage</li>
            <li class="pricing__plan-feature">2 Users Allowed</li>
            <li class="pricing__plan-feature">Send up to 3 GB</li>
          </ul>
          <button class="pricing__plan-button">Learn More</button>
        </article>

        <article class="pricing__plan pricing__plan--professional">
          <h2 class="pricing__plan-title">Professional</h2>
          <p class="pricing__plan-price">249.99</p>
          <ul class="pricing__plan-features">
            <li class="pricing__plan-feature">1 TB Storage</li>
            <li class="pricing__plan-feature">5 Users Allowed</li>
            <li class="pricing__plan-feature">Send up to 10 GB</li>
          </ul>
          <button class="pricing__plan-button">Learn More</button>
        </article>

        <article class="pricing__plan pricing__plan--master">
          <h2 class="pricing__plan-title">Master</h2>
          <p class="pricing__plan-price">399.99</p>
          <ul class="pricing__plan-features">
            <li class="pricing__plan-feature">2 TB Storage</li>
            <li class="pricing__plan-feature">10 Users Allowed</li>
            <li class="pricing__plan-feature">Send up to 20 GB</li>
          </ul>
          <button class="pricing__plan-button">Learn More</button>
        </article>
      </section>
    </main>
  </body>
</html>
