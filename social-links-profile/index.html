<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social links profile</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon" />
  </head>
  <body>
    <article class="card">
      <img
        alt="avatar jessica"
        src="images/avatar-jessica.jpeg"
        class="card__avatar" />
      <h2 class="card__name">Jessica Randall</h2>
      <p class="card__location">London, United Kingdom</p>
      <p class="card__quote">"Front-end developer and avid reader."</p>
      <section class="card__links">
        <a href="index.html" class="card__link">GitHub</a>
        <a href="index.html" class="card__link">Frontend Mentor</a>
        <a href="index.html" class="card__link">LinkedIn</a>
        <a href="index.html" class="card__link">Twitter</a>
        <a href="index.html" class="card__link">Instagram</a>
      </section>
    </article>
  </body>
</html>
